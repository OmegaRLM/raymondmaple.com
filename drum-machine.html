<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Machine — Raymond Maple</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    /* Top accent border */
    .top-border {
      width: 100%;
      height: 3px;
      flex-shrink: 0;
      background: linear-gradient(
        90deg,
        #58a6ff 0%,
        #d2a8ff 33%,
        #3fb950 66%,
        #58a6ff 100%
      );
      background-size: 200% 100%;
      animation: shimmer 6s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* Grid */
    #grid {
      flex: 1;
      display: grid;
      /* columns and rows set by JS */
    }

    .cell {
      border: 1px solid rgba(88, 166, 255, 0.08);
      cursor: pointer;
      position: relative;
      transition:
        background 0.06s ease,
        box-shadow  0.06s ease;
    }

    .cell:hover {
      background: rgba(88, 166, 255, 0.88);
      box-shadow:
        0 0 18px 4px rgba(88, 166, 255, 0.55),
        inset 0 0 12px rgba(255, 255, 255, 0.12);
      z-index: 1;
    }

    /* Fade out — handled by JS adding/removing a class so we can
       have a slower fade-out than fade-in */
    .cell.lit {
      background: rgba(88, 166, 255, 0.88);
      box-shadow:
        0 0 18px 4px rgba(88, 166, 255, 0.55),
        inset 0 0 12px rgba(255, 255, 255, 0.12);
      z-index: 1;
    }

    .cell.fading {
      background: transparent;
      box-shadow: none;
      transition:
        background 0.35s ease,
        box-shadow  0.35s ease;
    }
  </style>
</head>
<body>

  <div class="top-border"></div>
  <div id="grid"></div>

  <script>
    const COLS = 16;
    const grid = document.getElementById('grid');

    function build() {
      const availH = window.innerHeight - 3; // subtract border height
      const cellW  = window.innerWidth / COLS;
      const rows   = Math.round(availH / cellW);

      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
      grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;

      const total = COLS * rows;
      for (let i = 0; i < total; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.dataset.col   = i % COLS;
        cell.dataset.row   = Math.floor(i / COLS);

        cell.addEventListener('mouseenter', () => {
          cell.classList.remove('fading');
          cell.classList.add('lit');
        });

        cell.addEventListener('mouseleave', () => {
          cell.classList.remove('lit');
          cell.classList.add('fading');
          // clean up after transition ends
          cell.addEventListener('transitionend', () => {
            cell.classList.remove('fading');
          }, { once: true });
        });

        grid.appendChild(cell);
      }
    }

    build();

    // Rebuild on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(build, 120);
    });
  </script>

</body>
</html>
